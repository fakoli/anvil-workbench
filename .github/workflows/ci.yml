name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  api-contracts:
    name: API contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build

  compose-config:
    name: Compose configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate interpolation and Compose shape
        env:
          WORKBENCH_POSTGRES_PASSWORD: ci-postgres-password
          WORKBENCH_NEO4J_PASSWORD: ci-neo4j-password
          WORKBENCH_OWNER: ci-owner
          ANVIL_ROUTER_BASE_URL: http://127.0.0.1:8000/v1
          ANVIL_ROUTER_TOKEN: ci-router-token
        run: docker compose config -q
