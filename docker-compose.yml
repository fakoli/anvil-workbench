services:
  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${ANVIL_WORKBENCH_BIND:-127.0.0.1}:${ANVIL_WORKBENCH_PORT:-8090}:8080"
    networks: [workbench]
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    environment:
      WORKBENCH_DATABASE_URL: postgresql://workbench:${WORKBENCH_POSTGRES_PASSWORD:?set in .env}@db:5432/workbench
      WORKBENCH_NEO4J_URI: bolt://neo4j:7687
      WORKBENCH_NEO4J_USER: neo4j
      WORKBENCH_NEO4J_PASSWORD: ${WORKBENCH_NEO4J_PASSWORD:?set in .env}
      WORKBENCH_OWNER: ${WORKBENCH_OWNER:?set in .env}
      WORKBENCH_APPROVERS: ${WORKBENCH_APPROVERS:-}
      WORKBENCH_IDENTITY_HEADER: ${WORKBENCH_IDENTITY_HEADER:-Tailscale-User-Login}
      # Hub-held content-fingerprint key for durable chat persistence. Left unset
      # the hub builds no conversation store and every chat endpoint returns 503;
      # set it (host env or .env) to enable chat. Never returned to the browser.
      WORKBENCH_PLUGIN_CAPABILITY_FILE: ${WORKBENCH_PLUGIN_CAPABILITY_FILE:-}
      WORKBENCH_CHAT_HASH_KEY: ${WORKBENCH_CHAT_HASH_KEY:-}
      # Loopback-only development escape hatch. Production must remain false and
      # receive identity exclusively from the tailnet proxy.
      WORKBENCH_ALLOW_INSECURE_DEV_ACTOR: ${WORKBENCH_ALLOW_INSECURE_DEV_ACTOR:-false}
      ANVIL_ROUTER_BASE_URL: ${ANVIL_ROUTER_BASE_URL:?set in .env}
      ANVIL_ROUTER_TOKEN: ${ANVIL_ROUTER_TOKEN:?set in the host environment}
      WORKBENCH_SANDBOX_MODELS: ${WORKBENCH_SANDBOX_MODELS:-}
      # Private Anvil Voice Realtime origin; this is consumed only by the hub
      # relay and is never returned to the browser.
      ANVIL_VOICE_REALTIME_URL: ${ANVIL_VOICE_REALTIME_URL:-}
      ANVIL_VOICE_REALTIME_TOKEN: ${ANVIL_VOICE_REALTIME_TOKEN:-}
      WORKBENCH_VOICE_RETAIN_TRANSCRIPTS: ${WORKBENCH_VOICE_RETAIN_TRANSCRIPTS:-false}
      WORKBENCH_EMBEDDING_MODEL: ${WORKBENCH_EMBEDDING_MODEL:-}
      WORKBENCH_RERANK_MODEL: ${WORKBENCH_RERANK_MODEL:-}
      # Operator-reviewed chat-route allowlist (closed chat-turn.v1 shape; no
      # endpoint/URL/token/policy field). Empty serves the honest empty allowlist;
      # a malformed value fails GET /api/chat/routes closed (503).
      WORKBENCH_CHAT_ROUTES: ${WORKBENCH_CHAT_ROUTES:-}
      # Explicit live-surface opt-in. Empty keeps every injectable supervision
      # surface None -> 503 (the hermetic default). An unknown name fails the hub
      # closed at startup. Each named surface needs its reviewed dependency below.
      WORKBENCH_LIVE_SURFACES: ${WORKBENCH_LIVE_SURFACES:-}
      # Reviewed dependencies for the live surfaces (each empty = that surface
      # stays unconfigured / 503). Set the audit key in the host environment.
      WORKBENCH_SETTINGS_CATALOG_FILE: ${WORKBENCH_SETTINGS_CATALOG_FILE:-}
      WORKBENCH_PREF_AUDIT_KEY: ${WORKBENCH_PREF_AUDIT_KEY:-}
      WORKBENCH_PLUGIN_CATALOG_FILE: ${WORKBENCH_PLUGIN_CATALOG_FILE:-}
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks: [workbench]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8090/healthz', timeout=3).read()"]
      interval: 5s
      timeout: 5s
      retries: 20

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: workbench
      POSTGRES_USER: workbench
      POSTGRES_PASSWORD: ${WORKBENCH_POSTGRES_PASSWORD:?set in .env}
    volumes: [workbench-postgres:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workbench -d workbench"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [workbench]
    restart: unless-stopped

  neo4j:
    image: neo4j:2026.01
    environment:
      NEO4J_AUTH: neo4j/${WORKBENCH_NEO4J_PASSWORD:?set in .env}
      NEO4J_server_memory_pagecache_size: 512M
    volumes: [workbench-neo4j:/data]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7474 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [workbench]
    restart: unless-stopped

networks:
  workbench:
    name: anvil-workbench

volumes:
  workbench-postgres:
  workbench-neo4j:
